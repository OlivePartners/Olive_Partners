<style>

html { scroll-behavior:smooth; }

body {
margin:0;
font-family:'Inter', sans-serif;
color:#1f2e23;
}

/* NAV */
.nav {
position:fixed;
width:100%;
background:#1f3a2c;
z-index:1000;
}

.nav-inner {
width:90%;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 0;
}

.logo {
font-family:'Playfair Display';
color:white;
font-size:18px;
}

.logo span {
display:block;
font-size:10px;
letter-spacing:3px;
color:#C2A85A;
}

/* HERO */
.hero {
height:100vh;
padding-top:80px;
background:
linear-gradient(rgba(31,58,44,0.7), rgba(31,58,44,0.7)),
url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=1600&auto=format&fit=crop');
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
}

.hero h1 {
font-family:'Playfair Display';
font-size:48px;
line-height:1.3;
padding:0 15px;
}

/* SECTIONS */
.section {
padding:100px 20px;
text-align:center;
scroll-margin-top:90px;
}

.text {
max-width:700px;
margin:auto;
line-height:1.8;
font-size:15px;
}

/* CARDS */
.card-grid {
display:flex;
gap:25px;
justify-content:center;
margin-top:40px;
flex-wrap:wrap;
}

.card {
background:white;
padding:30px;
width:280px;
border-top:3px solid #C2A85A;
text-align:left;
}

/* ASSISTED */
.assisted {
background:
linear-gradient(rgba(31,58,44,0.88), rgba(31,58,44,0.88)),
url('https://images.unsplash.com/photo-1581578731548-c64695cc6952?q=80&w=1600&auto=format&fit=crop');
background-size:cover;
background-position:center;
color:white;
}

/* CONTACT */
.contact {
background:#1f3a2c;
color:white;
padding:100px 20px;
}

.contact-grid {
display:flex;
gap:60px;
max-width:1100px;
margin:auto;
}

.contact-left { width:40%; }
.contact-right { width:50%; }

.label {
color:#C2A85A;
font-size:12px;
margin-top:20px;
}

.value {
margin-top:5px;
line-height:1.6;
}

input, textarea {
width:100%;
padding:14px;
margin-bottom:15px;
background:transparent;
border:1px solid rgba(255,255,255,0.2);
color:white;
font-size:14px;
}

button {
background:#C2A85A;
border:none;
padding:12px 26px;
cursor:pointer;
display:block;
margin-left:auto;
}

/* 🔥 MOBILE FIXES */
@media(max-width:768px){

.nav-inner {
flex-direction:column;
gap:10px;
}

.nav a {
margin-left:12px;
font-size:11px;
}

.hero h1 {
font-size:32px;
}

.section {
padding:80px 20px;
}

.card {
width:100%;
max-width:320px;
}

.contact-grid {
flex-direction:column;
gap:40px;
}

.contact-left, .contact-right {
width:100%;
}

button {
width:100%;
margin-left:0;
}

}

</style>
